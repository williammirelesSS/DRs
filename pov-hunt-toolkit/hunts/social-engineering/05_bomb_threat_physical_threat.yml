name: "Social Engineering: Bomb threat and physical threat emails"
description: |
  Hunts for bomb threat and physical threat emails directed at an organisation.
  These are a distinct subset of threat/extortion emails that specifically reference
  physical harm, buildings, or evacuations. Typically mass-sent to many organisations
  simultaneously as scare tactics, often demanding cryptocurrency payment.

  These require immediate escalation to security/legal when found.
type: "hunt"
tier: "social-engineering"
visibility: "private"
tags: ["bomb-threat", "physical-threat", "extortion", "escalation-required"]
suggested_lookback_days: 90
fp_notes: "Extremely low FP rate — any match should be reviewed immediately"
source: |
  type.inbound
  and (
    regex.icontains(body.current_thread.text,
      "(bomb|explosive|detonation|detonate|will explode|placed.*device|your building|your office|evacuate|evacuation|blast radius)"
    )
    or regex.icontains(body.current_thread.text,
      "(shooter|shooting|gunman|open fire|armed.*person|attack.*building|attack.*office)"
    )
  )
  and (
    // Demand component
    regex.icontains(body.current_thread.text,
      "(pay|bitcoin|transfer|wire|deposit|send money|ransom)"
    )
    // Or time pressure
    or regex.icontains(body.current_thread.text,
      "(hours|minutes|deadline|before.*time|timer)"
    )
  )
