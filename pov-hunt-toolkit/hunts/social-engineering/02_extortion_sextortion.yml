name: "Social Engineering: Extortion and sextortion threats"
description: |
  Hunts for extortion and sextortion emails. These messages typically claim the
  attacker has compromising footage or access to the victim's device, demand
  cryptocurrency payment, and include threats of exposure.

  Common variants:
  - Classic sextortion (webcam compromise claim)
  - Breach data leverage (includes victim's old password to add credibility)
  - Business extortion (threatens to damage company reputation)
  - Physical threat emails ("we know where you live")

  Usually from new senders, short body, few or no links, payment demanded in BTC.
type: "hunt"
tier: "social-engineering"
visibility: "private"
tags: ["extortion", "sextortion", "bitcoin", "blackmail", "threat"]
suggested_lookback_days: 90
fp_notes: "Very low FP rate — this pattern is highly specific"
source: |
  type.inbound
  and not profile.by_sender().solicited
  and (
    // NLU extortion intent
    any(ml.nlu_classifier(body.current_thread.text).intents,
        .name == "extortion" and .confidence in ("medium", "high")
    )
    // Bitcoin payment demand
    or regex.icontains(body.current_thread.text,
      "(bitcoin|BTC|cryptocurrency|crypto wallet|wallet address|payment.*within|send.*bitcoin|transfer.*bitcoin|pay.*bitcoin)"
    )
    // Classic sextortion language
    or regex.icontains(body.current_thread.text,
      "(recorded you|footage of you|compromising video|webcam|accessed your device|rat software|remote access|your contacts will receive|will expose|you were watching|adult content)"
    )
    // Breach data leverage
    or (
      regex.icontains(body.current_thread.text, "password|credential")
      and regex.icontains(body.current_thread.text, "pay|bitcoin|transfer|send")
    )
  )
