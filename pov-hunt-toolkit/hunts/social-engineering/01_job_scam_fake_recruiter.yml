name: "Social Engineering: Job scam / fake recruiter lure"
description: |
  Hunts for fake job offer and recruitment scam emails. Common pretexts include
  part-time work from home, flexible income, or unsolicited job offers from
  unrelated companies. Frequently uses freemail senders and asks victims to
  respond to an alternate email address in the body.

  Variants seen: AppSheet-based job scam waves, fake LinkedIn recruiter follow-ups,
  "remote data entry" and "brand ambassador" scams.
type: "hunt"
tier: "social-engineering"
visibility: "private"
tags: ["job-scam", "social-engineering", "fake-recruiter", "freemail"]
suggested_lookback_days: 30
fp_notes: "Legitimate recruitment emails from staffing agencies may match — check sender domain age and whether an alternate email is embedded in the body"
source: |
  type.inbound
  and sender.email.domain.root_domain in $free_email_providers
  and not profile.by_sender().solicited
  and not profile.by_sender().any_messages_benign
  and (
    any(ml.nlu_classifier(body.current_thread.text).intents,
        .name in ("job_scam") and .confidence in ("medium", "high")
    )
    or (
      regex.icontains(subject.subject,
        "job|position|hiring|opportunity|recruitment|vacancy|opening|role|career"
      )
      and regex.icontains(body.current_thread.text,
        "part.time|work from home|flexible|weekly pay|salary|per hour|data entry|brand ambassador|remote work|no experience|earn.*per week"
      )
    )
  )
  and regex.contains(body.current_thread.text,
                     "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
  )
