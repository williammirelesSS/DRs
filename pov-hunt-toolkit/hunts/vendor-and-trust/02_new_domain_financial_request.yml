name: "Vendor Risk: Financial request from newly registered sender domain"
description: |
  Hunts for invoice, payment, or financial request emails from senders whose
  domains were registered within the last 90 days. A newly registered domain
  sending financial requests is a strong BEC / vendor impersonation signal.

  This is the "fake invoice from new domain" attack pattern: attackers register
  a domain that looks like a real vendor (invoice-acme.com, acmebilling.com)
  and send realistic-looking payment requests.

  Results with domains < 30 days old are high priority. 30-90 days is medium.
type: "hunt"
tier: "vendor-and-trust"
visibility: "private"
tags: ["bec", "new-domain", "invoice-fraud", "payment-fraud", "vendor-impersonation"]
suggested_lookback_days: 30
fp_notes: "Startups and newly formed vendors will match — verify with whois if domain age is borderline (60-90 days)"
source: |
  type.inbound
  and network.whois(sender.email.domain).days_old < 90
  and not profile.by_sender().solicited
  and sender.email.domain.root_domain not in $org_domains
  and (
    regex.icontains(subject.subject,
      "invoice|payment|wire|transfer|remittance|outstanding|overdue|purchase order|bank.*detail|account.*change|supplier.*detail"
    )
    or regex.icontains(body.current_thread.text,
      "please.*(?:pay|transfer|wire|send).{0,30}(?:amount|funds|payment)|(?:kindly|please).{0,20}(?:process|settle|clear).{0,20}(?:invoice|payment)|bank.*(?:detail|account|number)|account.*change|new.*banking"
    )
    or any(ml.nlu_classifier(body.current_thread.text).intents,
           .name in ("bec", "payment") and .confidence in ("medium", "high")
    )
  )
