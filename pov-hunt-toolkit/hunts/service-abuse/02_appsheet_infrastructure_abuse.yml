name: "Service Abuse: AppSheet (Google) infrastructure used for phishing"
description: |
  Hunts for messages from AppSheet (noreply@appsheet.com) containing links to
  suspicious external domains. AppSheet abuse is a well-documented attack vector
  where attackers use Google's trusted AppSheet infrastructure to send phishing
  emails that pass SPF/DKIM/DMARC checks.

  Frequently paired with job scam lures (fake job offers with AppSheet forms).
type: "hunt"
tier: "service-abuse"
visibility: "private"
tags: ["service-abuse", "appsheet", "google", "job-scam", "trusted-infrastructure"]
suggested_lookback_days: 30
fp_notes: "Legitimate AppSheet app invitations will appear -- check if link domain is newly registered or suspicious"
source: |
  type.inbound
  and sender.email.email == "noreply@appsheet.com"
  and any(filter(body.links, .href_url.domain.root_domain != "appsheet.com"),
          network.whois(.href_url.domain).days_old <= 30
          or .href_url.domain.root_domain in $free_file_hosts
          or .href_url.domain.root_domain in $url_shorteners
          or .href_url.domain.root_domain in $free_subdomain_hosts
  )
