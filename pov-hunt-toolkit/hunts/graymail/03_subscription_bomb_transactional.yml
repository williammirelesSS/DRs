name: "Graymail: Subscription bomb ŌĆö transactional confirmation wave"
description: |
  Hunts for subscription bomb attacks. A subscription bomb is when an attacker
  automatically signs a target up to dozens or hundreds of online services
  simultaneously, flooding their inbox with legitimate-looking confirmation emails.

  These messages are transactional confirmations (account created, welcome, verify
  email) ŌĆö they do NOT contain unsubscribe links, so the baseline graymail hunt
  misses them entirely.

  Scope this hunt to a specific targeted mailbox (replace placeholder) when
  investigating a reported subscription bomb incident. Results above 20+ unique
  senders in a 30-minute window confirms an active attack.

  This hunt is the result of real-world incident analysis: 29/29 recall with ~1.2% FP rate.
type: "hunt"
tier: "graymail"
visibility: "private"
tags: ["subscription-bomb", "transactional", "graymail", "email-bomb", "incident-response"]
suggested_lookback_days: 7
fp_notes: "Scope to a specific mailbox when investigating an incident. Broad application will catch legitimate welcome/onboarding emails."
source: |
  type.inbound
  // Scope to a specific mailbox when investigating a subscription bomb
  // Replace the placeholder or remove this line for broad org-wide hunt
  // and mailbox.email.email == "targeted.user@organisation.com"
  and not profile.by_sender().solicited
  and profile.by_sender().prevalence in ("new", "outlier", "rare")
  and (
    // Transactional sender patterns
    sender.email.local_part in (
      "noreply", "newsletter", "validation", "mailer", "mail", "bounce", "donotreply"
    )
    or regex.icontains(sender.email.local_part, "(?:subscri|no.reply)")
    // Confirmation/verification links in body
    or any(body.links,
           regex.icontains(.href_url.url,
             "(?:verif|confirm|activat|validate|register|registrat|sign.?up|token|otp)"
           )
    )
    // English subscription subject patterns
    or regex.icontains(subject.subject,
      "confirm|verif|activat|register|registrat|welcom|subscription|newsletter|"
      "otp|signing.up|signed.up|sign.?up|you.ve.joined|you.re.in"
    )
    // Multilingual subjects (Japanese, French, Czech, Slovenian, Dutch, German, Italian, Russian, Portuguese)
    or regex.icontains(subject.subject,
      "Ķ│╝Ķ¬Ł|ńó║Ķ¬Ź|ńÖ╗ķī▓|ŃéłŃüåŃüōŃüØ|abonnement|bienvenue|inscription|"
      "registrace|ov─ø┼Öen├Ł|potvr─Åte|prijava|aangemaakt|inschrijving|"
      "best├żtigen|benvenuto|benvenuti|ą┐ąŠą┤čéą▓ąĄčĆą┤ąĖčéąĄ|ą┐ąŠą┤ą┐ąĖčüą║ą░|confirma├¦├Żo|bem-vindo"
    )
    // NLU topic fallback for novel patterns
    or any(ml.nlu_classifier(body.current_thread.text).topics,
           .name in ("Newsletters and Digests", "Reminders and Notifications")
           and .confidence in ("medium", "high")
    )
  )
  // Never block security-critical emails
  and not regex.icontains(subject.subject,
    "password.*reset|security.*alert|2fa|mfa|unauthorized|breach|account.*locked|magic.*link"
  )
