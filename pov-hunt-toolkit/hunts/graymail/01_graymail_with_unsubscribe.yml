name: "Graymail: Marketing and cold outreach (unsubscribe signal)"
description: |
  Baseline graymail hunt. Surfaces unsolicited marketing emails, newsletters,
  and cold B2B outreach that contain an unsubscribe link. These are the emails
  that technically aren't malicious but add noise and distraction to inboxes.

  Use this hunt to understand the volume of graymail in a customer environment
  before recommending the graymail detection rules. High results (thousands of
  groups) immediately justify the graymail conversation.
type: "hunt"
tier: "graymail"
visibility: "private"
tags: ["graymail", "marketing", "cold-outreach", "newsletter", "unsubscribe"]
suggested_lookback_days: 30
fp_notes: "Intentionally broad — all results are valid graymail, not FPs. Use to demonstrate volume."
source: |
  type.inbound
  and not profile.by_sender().solicited
  and (
    (
      length(recipients.to) == 1
    )
    or (
      length(recipients.to) == 0
      or all(recipients.to, .display_name == "Undisclosed recipients")
    )
  )
  and strings.ilike(body.current_thread.text, "*unsubscribe*")
