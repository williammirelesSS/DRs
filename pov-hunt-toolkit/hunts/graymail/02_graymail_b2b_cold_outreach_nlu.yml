name: "Graymail: B2B cold outreach and sales prospecting (NLU)"
description: |
  Aggressive graymail hunt using NLU topic modelling to catch B2B cold outreach
  that doesn't include an unsubscribe link. Covers: sales prospecting, marketing
  campaigns, event invitations, contact list solicitations.

  WARNING: Can return very high volumes in some environments (10K+ messages).
  Run private first and review sample before recommending as a detection rule.
  Pairs with the baseline graymail hunt to give complete graymail picture.
type: "hunt"
tier: "graymail"
visibility: "private"
tags: ["graymail", "b2b-cold-outreach", "nlu", "high-volume"]
suggested_lookback_days: 14
fp_notes: "Higher FP risk than baseline — some legitimate vendor communications will appear. Start with 7-14 day window."
source: |
  type.inbound
  and not profile.by_sender().solicited
  and (
    any(ml.nlu_classifier(body.current_thread.text,
                          display_name=sender.display_name,
                          subject=subject.subject
        ).topics,
        .name in (
          "B2B Cold Outreach",
          "Contact List Solicitation",
          "Advertising and Promotions",
          "Events and Webinars"
        )
        and .confidence in ("high", "medium")
    )
    or any(headers.hops, any(.fields, .name == "List-Unsubscribe"))
    or any(body.links,
           strings.icontains(.display_text, "unsubscribe")
           or strings.icontains(.href_url.path, "unsubscribe")
    )
  )
