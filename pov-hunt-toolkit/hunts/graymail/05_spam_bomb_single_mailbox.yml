name: "Graymail: Email bomb / spam flood to a specific mailbox"
description: |
  Hunts for an email bomb or spam flood targeting a single mailbox. Surfaces all
  inbound messages to a specific targeted user from new/unsolicited senders
  within a defined time window.

  Use this hunt when a user reports receiving an unusual volume of emails.
  Replace the placeholder mailbox with the affected user's email address.
  Run with a narrow lookback window (1-7 days) to isolate the incident window.

  Review results to:
  - Confirm attack vs accidental unsubscribe
  - Count unique senders (25+ unique senders in 30 min = confirmed bomb)
  - Identify if it's subscription-based (confirmations) or spam (link/promo heavy)
type: "hunt"
tier: "graymail"
visibility: "private"
tags: ["email-bomb", "spam-flood", "incident-response", "targeted-mailbox"]
suggested_lookback_days: 7
fp_notes: "Scoped hunt — replace mailbox placeholder before running. All results are relevant to the investigation."
source: |
  type.inbound
  // Replace with the targeted user's email address
  and mailbox.email.email == "targeted.user@organisation.com"
  and (
    profile.by_sender().prevalence in ("new", "outlier")
    or not profile.by_sender().solicited
  )
  // Optionally: filter to unsolicited only to exclude known senders
  and not profile.by_sender().any_messages_benign
