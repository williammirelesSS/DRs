name: "DLP/ATO: Outbound message redistributing credential phishing link"
description: |
  Detects outbound messages where a compromised internal account is being used
  to redistribute credential phishing links to external recipients. This is a
  hallmark of business email compromise post-takeover: the attacker leverages the
  trusted internal sender identity to deliver phishing URLs that bypass inbound
  filtering on the recipient side.

  Two signal paths:
    1. Link analysis identifies the URL as an active credential phishing page
       (medium or high confidence) — the gold standard.
    2. URL shortener in links combined with NLU detecting credential theft intent
       in the body — catches cases where the final page hasn't been crawled yet.
type: "rule"
severity: "high"
source: |
  type.outbound

  // at least one external recipient
  and any(recipients.to,
          .email.domain.root_domain not in $org_domains
  )

  and (
    // path 1: link analysis confirms active phishing page
    any(body.links,
        ml.link_analysis(.).credphish.disposition == "phishing"
        and ml.link_analysis(.).credphish.confidence in ("medium", "high")
    )

    // path 2: URL shortener + NLU detects credential theft language
    or (
      any(body.links,
          .href_url.domain.root_domain in $url_shorteners
          or .href_url.domain.domain in $url_shorteners
      )
      and any(ml.nlu_classifier(body.current_thread.text).intents,
              .name == "cred_theft" and .confidence in ("medium", "high")
      )
    )
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "URL analysis"
  - "Sender analysis"
id: "a1b2c3d4-0005-4f6a-9000-outbound00005"
