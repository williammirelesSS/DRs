name: "Exclusion: Outbound DLP — trusted service account senders"
description: |
  Excludes known automated service accounts and IT systems from outbound DLP
  security control rules. These senders legitimately send archives, executables,
  or encrypted payloads as part of normal operations (e.g. backup agents,
  deployment pipelines, security tooling exports).

  Customize the local_part list to match your org's service accounts.
type: "exclusion"
source: |
  type.outbound
  and sender.email.local_part in (
    "backup-service",
    "devops-deploy",
    "siem-export",
    "it-admin",
    "security-ops",
    "patch-mgmt",
    "endpoint-agent"
  )
